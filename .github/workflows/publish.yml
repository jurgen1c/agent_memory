name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Verify release tag and public package versions
        run: node scripts/release-packages.mjs verify-tag
      - name: Verify workspace package versions
        run: bun run version:check
      - run: bun run ci
      - run: node scripts/release-packages.mjs pack-dry-run
      - run: node scripts/release-packages.mjs publish
