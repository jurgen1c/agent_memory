name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version $expected_tag." >&2
            exit 1
          fi
      - name: Verify workspace package versions
        run: bun run version:check
      - run: bun run ci
      - run: npm pack --dry-run
      - run: npm pack --workspace @jurgen1c/agent-tools --dry-run
      - run: npm publish --provenance --access public
      - run: npm publish --workspace @jurgen1c/agent-tools --provenance --access public
